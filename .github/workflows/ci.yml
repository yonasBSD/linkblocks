name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  CARGO_INCREMENTAL: 0
  RUSTFLAGS: "-D warnings"

# Disable all permissions by default (https://docs.zizmor.sh/audits/#excessive-permissions)
permissions: {}

# Prevent race conditions and runner minute waste
# https://docs.zizmor.sh/audits/#concurrency-limits
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build-lint:
    name: Build & Lint
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres@sha256:5ec39c188013123927f30a006987c6b0e20f3ef2b54b140dfa96dac6844d883f
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false
          # For auto-setting the version description in `cargo build`
          fetch-depth: 0

      - name: Setup Rust toolchain
        run: rustup install stable

      - name: Setup rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          # For cargo-run-bin
          cache-directories: ".bin"

      - name: Install REUSE tool
        run: pipx install reuse

      - name: Install cargo-run-bin
        run: cargo install --locked cargo-run-bin

      - run: cargo bin sqlx-cli migrate run
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432

      # Use --no-deps to prevent the justfile from trying to launch a new podman container for the db
      - run: cargo bin just --no-deps generate-database-info
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432

      - run: cargo bin just clippy-lint

      - run: cargo bin just reuse-lint

      - run: cargo bin just generate-sbom

      - run: cargo bin just check-zizmor

      - name: Check for file changes
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            echo "::error::Detected changes in the following files:"
            git status --porcelain
            echo "Diff:"
            git diff
            exit 1
          fi

      - run: cargo build --release --locked

      - name: podman build linux/amd64
        run: podman build --platform linux/amd64 --tag ties -f Containerfile target/release

      - name: Verify container image
        run: cargo bin just verify-podman-container

  format-nightly:
    name: Check Formatting (nightly)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Rust toolchain
        run: rustup install nightly -c rustfmt

      - name: Setup rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          # For cargo-run-bin
          cache-directories: ".bin"

      - name: Install cargo-run-bin
        run: cargo install --locked cargo-run-bin

      - run: cargo bin just format-lint

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres@sha256:5ec39c188013123927f30a006987c6b0e20f3ef2b54b140dfa96dac6844d883f
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Setup Rust toolchain
        run: rustup install stable

      - name: Setup rust cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2
        with:
          # For cargo-run-bin
          cache-directories: ".bin"

      - name: Install cargo-run-bin
        run: cargo install --locked cargo-run-bin

      - name: cargo nextest
        run: cargo bin cargo-nextest run
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432
          SQLX_OFFLINE: true

  release-version:
    name: Release new version
    runs-on: ubuntu-latest
    permissions:
      packages: write # For uploading the container to GHCR
      contents: write # For creating a GitHub release
    needs: [test, build-lint, format-nightly]
    # Run for tags and main branch pushes
    if: (startsWith(github.ref_name, 'v') && github.ref_type == 'tag') || github.ref == 'refs/heads/main'
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      # Release build. This job intentionally does not
      # use a cache to prevent cache poisoning attacks.
      - run: cargo build --release --locked

      - name: podman build linux/amd64
        run: podman build --platform linux/amd64 --tag ties -f Containerfile target/release

      - name: podman login
        env:
          USER: ${{ github.actor }}
          PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        run: podman login --username "$USER" --password "$PASSWORD" ghcr.io

      - name: podman manifest push latest
        if: github.ref == 'refs/heads/main'
        run: podman image push ties ghcr.io/raffomania/ties:latest

      - name: Get version from tag
        id: extract_version
        if: github.ref_type == 'tag'
        run: |
          version=${GITHUB_REF_NAME#v}
          version=${version//test-release/}
          echo "version=$version" >> "$GITHUB_OUTPUT"
        shell: bash

      - uses: sean0x42/markdown-extract@7b185cbe85263116bbf741e739e7198ba86465dc # v2
        id: changelog_entry
        if: github.ref_type == 'tag'
        with:
          file: CHANGELOG.md
          pattern: ${{ steps.extract_version.outputs.version }}
          no-print-matched-heading: true

      # Preparations complete: create release and push container

      - name: Create GitHub release
        if: github.ref_type == 'tag'
        env:
          TITLE: ${{ steps.extract_version.outputs.version }}
          NOTES: ${{ steps.changelog_entry.outputs.markdown }}
          TAG: ${{ github.ref_name }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create --draft --notes "$NOTES" --title "$TITLE" "$TAG" target/release/ties

      - name: podman manifest push tag version
        if: ${{ !contains(github.ref_name, 'test-release') && github.ref_type == 'tag' }}
        run: podman image push ties ghcr.io/raffomania/ties:${STEPS_EXTRACT_VERSION_OUTPUTS_VERSION}
        env:
          # Prevent code injection by using an env var which is subject to normal shell quoting rules
          STEPS_EXTRACT_VERSION_OUTPUTS_VERSION: ${{ steps.extract_version.outputs.version }}
